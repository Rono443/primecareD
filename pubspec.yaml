name: primecare
description: "PrimeCare Laundry - Enterprise Grade Laundry Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # Backend & Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.9
  google_sign_in: ^6.1.6

  # Database
  shared_preferences: ^2.2.2

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  lottie: ^2.7.0
  flutter_spinkit: ^5.2.0
  font_awesome_flutter: ^10.6.0
  
  # Form & Validation
  form_validator: ^2.1.1

  # Date & Localization
  intl: ^0.18.1
  timeago: ^3.6.1

  # Maps & Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Charts & Analytics
  fl_chart: ^0.65.0

  # Utilities
  uuid: ^4.2.1
  url_launcher: ^6.2.1
  path_provider: ^2.1.1
  dio: ^5.4.0
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 23 # matches your local.properties

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  # Fonts are handled by the google_fonts package
